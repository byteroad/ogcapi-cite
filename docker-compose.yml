services:

  apache-httpd:
    build: ./apache-httpd/
    container_name: httpd
    depends_on:
      - pygeoapi
    env_file:
      - .env     # path to your .env file
    volumes:   
      # - ./apache-httpd/httpd-ssl.conf:/usr/local/apache2/conf/httpd.conf
      - ./apache-httpd/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./apache-httpd/robots.txt:/usr/local/apache2/htdocs/robots.txt      
      # - /etc/cert/2ogcapi.pem:/usr/local/apache2/conf/ogcapi/fullchain.pem
      # - /etc/cert/ogcapi_privkey4.pem:/usr/local/apache2/conf/ogcapi/privkey.pem
    ports:
      - "80:80"
      - "443:443"
    # networks:
    #   default:
    #     aliases:
    #       - cite.ogcapi.byteroad.net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pygeoapi:
    image: geopython/pygeoapi:latest
    container_name: pygeoapi
    expose:
      - "80"
    env_file:
      - .env     # path to your .env file
    volumes:
      - ./pygeoapi/docker.config.yml:/pygeoapi/local.config.yml
      - ./pygeoapi/templates:/templates # jinja templates
      - ./pygeoapi/Logo_DGT.png:/pygeoapi/pygeoapi/static/img/Logo_DGT.png # logo
      - ./pygeoapi/default.css:/pygeoapi/pygeoapi/static/css/default.css # ribbon
    restart: always
    links:
      - tiles
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tiles:
    image: ghcr.io/maplibre/martin
    restart: always
    environment:
      - DATABASE_URL=${REMOTE_TEST_URL}
      - WATCH_MODE=true
    command: --auto-bounds calc --cache-size 2048 --keep-alive 200 --pool-size 20 --webui disable --default-srid 4326 --save-config /tmp/config.yml
    networks:
      - default
    healthcheck:
      test: ["NONE"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  postgis:
    build: ./postgis/
    environment:
      POSTGRES_USER: ${REMOTE_TEST_USER}
      POSTGRES_PASSWORD: ${REMOTE_TEST_PASSWORD}
      POSTGRES_DB: ${REMOTE_TEST_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    env_file:
      - .env
    container_name: postgis
    volumes:
       - ./postgis/data:/var/lib/postgresql/data
    networks:
      - default
    restart: always

 
        
volumes:
  ghc_sqlitedb:

networks:
  default:
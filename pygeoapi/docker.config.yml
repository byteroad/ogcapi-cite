server:
  bind:
    host: 0.0.0.0
    port: ${CONTAINER_PORT}
  url: ${HOST_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
  - pt-PT
  - en-US
  cors: true
  pretty_print: true
  limits:
    default_items: 100
    max_items: 5000
    on_exceed: throttle
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap
      contributors</a>'
  admin: false
  templates:
    path: /templates
    static: /pygeoapi/pygeoapi/static
logging:
  level: DEBUG
  logfile: /tmp/pygeoapi.log

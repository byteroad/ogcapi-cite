resources:
  ortos-rgb:
    type: collection
    title: OrtoSat 30 cm - Portugal Continental - 2023 (Cor Verdadeira)
    description: 'TEST - A cobertura OrtoSat2023 é uma cobertura de ortoimagens obtidas a
      partir de imagens de satélite de muito grande resolução espacial adquirida durante
      o ano de 2023 sobre o território de Portugal continental. A cobertura é composta
      por um mosaico equalizado e ininterrupto de imagens de satélite ortorretificadas
      com uma resolução espacial de 30 cm. As imagens utilizadas na produção do mosaico
      foram obtidas da constelação de satélites Pleiades-Neo (3 & 4) durante o período
      de abril a outubro de 2023. Disponibilização em cor verdadeira: RGB: Vermelho,
      Verde e Azul.'
    keywords:
    - Cor verdadeira
    - TEST
    - Imagem de Satélite
    - Deteção Remota
    - Cartografia Oficial
    - '2023'
    - infoMapAccessService
    - SMOS
    - Ortoimagens
    - OrtoSat2023
    - Ortoimagem
    - Orto
    - Ortofoto
    - Ortofotos
    - Ortofotomapa
    - Ortofotomapas
    - OrtoSat
    - DGT
    links:
    - type: text/html
      rel: canonical
      title: information
      href: https://snig.dgterritorio.gov.pt/rndg/srv/por/catalog.search#/metadata/b2a1ca02-779b-4189-b895-85d10fff610f
      hreflang: en-US
    extents:
      spatial:
        bbox:
        - -10.1934
        - 36.7643
        - -5.70954
        - 42.2796
        crs: http://www.opengis.net/def/crs/EPSG/0/4326
      temporal:
        begin: null
        end: null
    providers:
    - type: map
      name: WMSFacade
      data: https://ortos.dgterritorio.gov.pt/wms/ortosat2023
      options:
        layer: ortoSat2023-CorVerdadeira
        style: default
        version: 1.3.0
      format:
        name: png
        mimetype: image/png
  srup_arvores_point:
    type: collection
    title: SRUP - Árvores de Interesse Público - Pontos
    description: TEST - Servidão e Restrição de Utilidade Pública (SRUP) - Árvores de Interesse Público, em vigor em Portugal Continental.
    keywords:
        - SRUP
        - TEST
        - AIP
        - Árvores de Interesse Público
        - DGT
        - Cartografia Oficial
    links:
        - type: text/csv
          rel: canonical
          title: data
          href: https://snig.dgterritorio.gov.pt/rndg/srv/por/catalog.search#/metadata/5f1fd08d-e404-4fa2-a4db-54632e57da31
          hreflang: en-US
    extents:
        spatial:
            bbox: [-9.785164, 36.962833, -6.000000, 42.104653]
            crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        temporal:
            begin: null
            end: null
    providers:
        - type: feature
          name: PostgreSQL
          storage_crs: http://www.opengis.net/def/crs/EPSG/0/3763
          data:
                dbname: ${REMOTE_TEST_DB}
                host: ${REMOTE_TEST_HOST}
                port: ${REMOTE_TEST_PORT}
                user: ${REMOTE_TEST_USER}
                password: ${REMOTE_TEST_PASSWORD}
                search_path:
                  - "public"
          id_field: fid
          table: srup_arvores_point
          geom_field: geom
          crs:
              - http://www.opengis.net/def/crs/OGC/1.3/CRS84
              - http://www.opengis.net/def/crs/EPSG/0/4326
              - http://www.opengis.net/def/crs/EPSG/0/3857
              - http://www.opengis.net/def/crs/EPSG/0/4258
              - http://www.opengis.net/def/crs/EPSG/0/3763
        - type: tile
          name: MVT-proxy
          data: http://tiles:3000/srup_arvores_point/{z}/{x}/{y}?f=mvt
          options:
            zoom:
                min: 0
                max: 15
            schemes:
            - WebMercatorQuad
          format:
                name: pbf
                mimetype: application/vnd.mapbox-vector-tile
  